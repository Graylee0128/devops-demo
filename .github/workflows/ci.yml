name: CI/CD

on:
  push:
  pull_request:

jobs:
  test:                              # ch3 / ch4：每次 push / PR 都跑 pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest -v --cov=app --cov-fail-under=70

  build-and-deploy:                  # ch6：測試過了，才 build → push GHCR → 更新 config repo
    needs: test                      # ← 測試沒過不部署
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write                # ⭐ 推 image 到 GHCR 需要
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}     # ← 內建 token，免設

# 💡 核心解法：在這裡將帳號名稱轉為全小寫，並存入環境變數 env.OWNER_LC
      - name: Downcase REPO owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 💡 修改這裡：將原本的 ${{ github.repository_owner }} 改成 ${{ env.OWNER_LC }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/devops-demo:latest
            ghcr.io/${{ env.OWNER_LC }}/devops-demo:${{ github.sha }}
      - name: Update Config Repo
        env:
          CONFIG_REPO_TOKEN: ${{ secrets.CONFIG_REPO_TOKEN }}
        run: |
          if [ -z "$CONFIG_REPO_TOKEN" ]; then
            echo "::warning::CONFIG_REPO_TOKEN 未設，略過更新 Config Repo（image 已推上 GHCR）"
            exit 0
          fi
          git clone https://x-access-token:${CONFIG_REPO_TOKEN}@github.com/Graylee0128/devops-config.git
          cd devops-config
          sed -i "s|image: ghcr.io/.*/devops-demo:.*|image: ghcr.io/Graylee0128/devops-demo:${{ github.sha }}|" k8s/deployment.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update image to ${{ github.sha }}" || echo "no change"
          git push
